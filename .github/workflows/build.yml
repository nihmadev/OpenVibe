name: Build & Release

on:
  push:
    branches: [main, dev]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, dev]

permissions:
  contents: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_RELEASE_DEBUG: false
  RUST_BACKTRACE: 0
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 16
  CARGO_PROFILE_RELEASE_LTO: "off"

jobs:
  quality-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Run JS/TS tests (Vitest)
        run: npm test

      - name: npm audit
        run: npm run audit
        continue-on-error: true

  quality-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            mold

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --workspace -- -D warnings
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

  build:
    needs: [quality-frontend, quality-rust]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: openvibe-windows-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: openvibe-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: openvibe-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (Tauri + mold linker)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            mold

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Build frontend (Vite)
        run: npm run build:src

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Configure mold linker for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p .cargo
          echo '[target.x86_64-unknown-linux-gnu]' > .cargo/config.toml
          echo 'linker = "clang"' >> .cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-fuse-ld=mold"]' >> .cargo/config.toml

      - name: Build Tauri
        run: npm run build:tauri
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          CMAKE_C_COMPILER_LAUNCHER: "sccache"
          CMAKE_CXX_COMPILER_LAUNCHER: "sccache"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Create Linux tar.gz
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p target/release/bundle/tar.gz
          tar -czf target/release/bundle/tar.gz/openvibe_amd64.tar.gz -C target/release openvibe

      - name: Compute SHA256 for all bundles
        shell: bash
        run: |
          node -e '
          const fs=require("fs"),c=require("crypto"),p=require("path");
          const r={};
          const findBundles=(dir)=>{
            if(!fs.existsSync(dir))return;
            fs.readdirSync(dir,{withFileTypes:true}).forEach(e=>{
              const f=p.join(dir,e.name);
              if(e.isDirectory()&&!e.name.endsWith(".app"))findBundles(f);
              else if(e.isFile()){
                const h=c.createHash("sha256").update(fs.readFileSync(f)).digest("hex");
                r[e.name]={sha256:h,size:fs.statSync(f).size,path:f};
              }
            });
          };
          findBundles("target/release/bundle");
          fs.writeFileSync("sha256-summary.json",JSON.stringify(r,null,2));
          console.log("Hashed files:",Object.keys(r).join(", "));
          '

      - name: Upload SHA256 summary
        uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.artifact-name }}
          path: sha256-summary.json
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/tar.gz/*.tar.gz
          if-no-files-found: ignore

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app
          if-no-files-found: ignore

  release-assets:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download SHA256 summaries
        uses: actions/download-artifact@v4
        with:
          pattern: sha256-*

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: openvibe-windows-x64
          path: release-binaries

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: openvibe-linux-x64
          path: release-binaries

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: openvibe-macos-arm64
          path: release-binaries

      - name: List downloaded binaries
        run: ls -la release-binaries/ || echo "EMPTY"

      - name: Generate latest.json for auto-updater
        env:
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          node -e '
          const fs=require("fs"),p=require("path");
          const dirs=fs.readdirSync(".").filter(f=>fs.statSync(f).isDirectory()&&f.startsWith("sha256-"));
          const platforms={};
          const version=process.env.TAG.replace(/^v/,"");
          const baseUrl="https://github.com/nihmadev/OpenVibe/releases/download/"+process.env.TAG+"/";
          dirs.forEach(dir=>{
            const summaryPath=p.join(dir,"sha256-summary.json");
            if(!fs.existsSync(summaryPath))return;
            const data=JSON.parse(fs.readFileSync(summaryPath,"utf-8"));
            const platKey=dir.replace("sha256-openvibe-","").replace("sha256-","");
            const priority=["tar.gz","msi","exe","dmg","deb"];
            let chosen=null;
            for(const ext of priority){
              const key=Object.keys(data).find(k=>k.endsWith("."+ext)||k.toLowerCase().endsWith(ext.toLowerCase()));
              if(key){chosen={name:key,...data[key]};break;}
            }
            if(chosen){
              platforms[platKey]={
                url:baseUrl+chosen.name,
                sha256:chosen.sha256,
                size:chosen.size
              };
            }
          });
          const latest={version,releasedAt:new Date().toISOString(),platforms};
          fs.writeFileSync("latest.json",JSON.stringify(latest,null,2));
          console.log(JSON.stringify(latest,null,2));
          '

      - name: Release all assets to GitHub
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            latest.json
            release-binaries/*.msi
            release-binaries/*.exe
            release-binaries/*.deb
            release-binaries/*.rpm
            release-binaries/*.tar.gz
            release-binaries/*.dmg
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install root dependencies
        run: npm install

      - name: Build npm package
        working-directory: packages/openvibe-desktop
        run: |
          npm install
          npm run build

      - name: Check NPM_TOKEN
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::warning::NPM_TOKEN secret is not set. Skipping npm publish."
            exit 1
          fi

      - name: Publish to npm
        working-directory: packages/openvibe-desktop
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
