name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*", "*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_RELEASE_DEBUG: false
  RUST_BACKTRACE: 0
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 16
  CARGO_PROFILE_RELEASE_LTO: "off"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Run JS/TS tests (Vitest)
        run: npm test

      - name: npm audit
        run: npm run audit
        continue-on-error: true

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Rust clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

  build:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: openvibe-windows-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: openvibe-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: openvibe-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Linux system deps (Tauri + mold linker)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            mold

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Build frontend (Vite)
        run: npm run build:src

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}

      - name: Build Tauri
        run: npm run build:tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Compute SHA256
        shell: bash
        run: |
          node -e '
          const fs=require("fs"),c=require("crypto"),p=require("path");
          const d="src-tauri/target/release/bundle";
          const r={};
          const w=dir=>{
            if(!fs.existsSync(dir))return;
            fs.readdirSync(dir,{withFileTypes:true}).forEach(e=>{
              const f=p.join(dir,e.name);
              if(e.isFile()){
                const h=c.createHash("sha256").update(fs.readFileSync(f)).digest("hex");
                r[e.name]={sha256:h,size:fs.statSync(f).size};
              }else if(e.isDirectory())w(f);
            });
          };
          w(d);
          fs.writeFileSync("sha256-summary.json",JSON.stringify(r,null,2));
          console.log("sha256:",Object.keys(r).join(", "));
          '

      - name: Upload SHA256 summary
        uses: actions/upload-artifact@v7
        with:
          name: sha256-${{ matrix.artifact-name }}
          path: sha256-summary.json
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload build artifacts (for release-please)
        uses: actions/upload-artifact@v7
        with:
          name: openvibe-${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: false

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-assets:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download SHA256 summaries
        uses: actions/download-artifact@v8
        with:
          pattern: sha256-*

      - name: Generate latest.json
        env:
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          node -e '
          const fs=require("fs"),p=require("path");
          const dirs=fs.readdirSync(".").filter(f=>fs.statSync(f).isDirectory()&&f.startsWith("sha256-"));
          const platforms={};
          const version=process.env.TAG.replace(/^v/,"");
          dirs.forEach(dir=>{
            const summaryPath=p.join(dir,"sha256-summary.json");
            if(!fs.existsSync(summaryPath))return;
            const data=JSON.parse(fs.readFileSync(summaryPath,"utf-8"));
            const keys=Object.keys(data);
            if(keys.length>0){
              const fileName=keys[0];
              const platKey=dir.replace("sha256-","");
              platforms[platKey]={
                url:"https://github.com/nihmadev/OpenVibe/releases/download/"+process.env.TAG+"/"+fileName,
                sha256:data[fileName].sha256,
                size:data[fileName].size
              };
            }
          });
          const latest={version,releaseAt:new Date().toISOString(),platforms};
          fs.writeFileSync("latest.json",JSON.stringify(latest,null,2));
          console.log("latest.json generated:");
          console.log(JSON.stringify(latest,null,2));
          '

      - name: Upload latest.json to Release
        uses: softprops/action-gh-release@v3
        with:
          files: latest.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install root dependencies
        run: npm install

      - name: Build npm package
        working-directory: packages/openvibe-desktop
        run: |
          npm install
          npm run build

      - name: Publish to npm
        working-directory: packages/openvibe-desktop
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
